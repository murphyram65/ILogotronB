<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>iLogotron - Générateur de mots savants</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Exo+2:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --neon-green: #39ff14;
  --neon-pink: #ff2d78;
  --neon-cyan: #00f5ff;
  --neon-orange: #ff6b00;
  --deep-space: #0a0c12;
  --space-blue: #0e121f;
  --panel-bg: rgba(0, 245, 255, 0.05);
  --panel-border: rgba(0, 245, 255, 0.25);
  --glow-green: 0 0 8px #39ff14, 0 0 20px rgba(57,255,20,0.3);
  --glow-pink: 0 0 8px #ff2d78, 0 0 20px rgba(255,45,120,0.4);
  --glow-cyan: 0 0 8px #00f5ff, 0 0 20px rgba(0,245,255,0.3);
}

html, body {
  height: 100%;
  overflow-x: hidden;
}

body {
  font-family: 'Exo 2', sans-serif;
  background: linear-gradient(135deg, #05070c 0%, #0a0f1a 50%, #03050a 100%);
  min-height: 100vh;
  color: #d0eaff;
  position: relative;
  padding-bottom: 40px;
}

/* Fond étoilé amélioré */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: 
    radial-gradient(2px 2px at 15% 25%, rgba(255,255,255,0.9) 0%, transparent 100%),
    radial-gradient(2px 2px at 35% 12%, rgba(0,245,255,0.8) 0%, transparent 100%),
    radial-gradient(3px 3px at 52% 35%, rgba(255,255,255,0.85) 0%, transparent 100%),
    radial-gradient(2px 2px at 78% 8%, rgba(255,45,120,0.7) 0%, transparent 100%),
    radial-gradient(2px 2px at 88% 28%, rgba(57,255,20,0.7) 0%, transparent 100%),
    radial-gradient(3px 3px at 42% 55%, rgba(255,255,255,0.8) 0%, transparent 100%),
    radial-gradient(2px 2px at 65% 72%, rgba(0,245,255,0.6) 0%, transparent 100%),
    radial-gradient(2px 2px at 25% 85%, rgba(255,45,120,0.6) 0%, transparent 100%),
    radial-gradient(2px 2px at 92% 45%, rgba(57,255,20,0.6) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 5% 60%, rgba(255,255,255,0.7) 0%, transparent 100%),
    radial-gradient(2px 2px at 48% 78%, rgba(0,245,255,0.5) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 72% 55%, rgba(255,107,0,0.6) 0%, transparent 100%),
    radial-gradient(2px 2px at 8% 35%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(2px 2px at 95% 82%, rgba(255,45,120,0.5) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 58% 92%, rgba(57,255,20,0.5) 0%, transparent 100%);
  background-size: 300px 300px;
  background-repeat: repeat;
  pointer-events: none;
  z-index: 0;
  animation: starsFloat 120s linear infinite;
}

@keyframes starsFloat {
  0% { background-position: 0 0; }
  100% { background-position: 300px 300px; }
}

/* Lignes de balayage */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0, 0, 0, 0.2) 2px,
    rgba(0, 0, 0, 0.2) 4px
  );
  pointer-events: none;
  z-index: 1;
}

.container {
  position: relative;
  z-index: 2;
  max-width: 430px;
  margin: 0 auto;
  padding: 0 16px;
}

/* ===== HEADER ===== */
header {
  text-align: center;
  padding: 32px 0 20px;
  position: relative;
}

.header-beam {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 60%;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
  box-shadow: var(--glow-cyan);
}

.title-wrap {
  display: inline-block;
  position: relative;
}

header h1 {
  font-family: 'Orbitron', sans-serif;
  font-size: 3rem;
  font-weight: 900;
  color: var(--neon-cyan);
  letter-spacing: 6px;
  text-transform: uppercase;
  text-shadow: var(--glow-cyan), 0 0 40px rgba(0,245,255,0.2);
  animation: titlePulse 3s ease-in-out infinite;
}

@keyframes titlePulse {
  0%, 100% { text-shadow: 0 0 8px #00f5ff, 0 0 20px rgba(0,245,255,0.3); }
  50% { text-shadow: 0 0 14px #00f5ff, 0 0 40px rgba(0,245,255,0.6), 0 0 70px rgba(0,245,255,0.2); }
}

.title-sub {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.65rem;
  color: var(--neon-pink);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 4px;
  text-shadow: var(--glow-pink);
  opacity: 0.85;
}

.corner-deco {
  position: absolute;
  width: 14px;
  height: 14px;
}
.corner-deco.tl { top: 0; left: 0; border-top: 2px solid var(--neon-cyan); border-left: 2px solid var(--neon-cyan); }
.corner-deco.tr { top: 0; right: 0; border-top: 2px solid var(--neon-cyan); border-right: 2px solid var(--neon-cyan); }
.corner-deco.bl { bottom: 0; left: 0; border-bottom: 2px solid var(--neon-cyan); border-left: 2px solid var(--neon-cyan); }
.corner-deco.br { bottom: 0; right: 0; border-bottom: 2px solid var(--neon-cyan); border-right: 2px solid var(--neon-cyan); }

/* ===== DIVIDER ===== */
.divider {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 6px 0 20px;
}
.divider-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
  opacity: 0.4;
}
.divider-icon {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.6rem;
  color: var(--neon-cyan);
  opacity: 0.6;
  letter-spacing: 2px;
}

/* ===== MAIN CARD ===== */
.main-card {
  background: var(--panel-bg);
  border: 1px solid var(--panel-border);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
  margin-bottom: 16px;
  backdrop-filter: blur(4px);
}

.main-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
  opacity: 0.6;
}

.card-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  border-bottom: 1px solid rgba(0,245,255,0.08);
  background: rgba(0,245,255,0.03);
}

.card-header-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--neon-green);
  box-shadow: var(--glow-green);
  animation: blink 1.8s ease-in-out infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.card-header-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.62rem;
  color: var(--neon-cyan);
  letter-spacing: 2px;
  text-transform: uppercase;
  opacity: 0.7;
}

.card-body {
  padding: 22px 16px 24px;
}

/* ===== WORD DISPLAY ===== */
.word-display {
  text-align: center;
  margin-bottom: 18px;
  padding: 18px 12px 14px;
  position: relative;
  background: rgba(0,0,0,0.4);
  border-radius: 3px;
  border: 1px solid rgba(255, 45, 120, 0.25);
}

.word-display::before {
  content: '';
  position: absolute;
  top: 0; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--neon-pink), transparent);
  opacity: 0.5;
}

.word-main {
  font-family: 'Orbitron', sans-serif;
  font-size: 2.1rem;
  font-weight: 700;
  color: var(--neon-pink);
  letter-spacing: 2px;
  text-shadow: var(--glow-pink);
  line-height: 1.1;
  word-break: break-all;
  animation: wordAppear 0.4s ease-out;
}

@keyframes wordAppear {
  from { opacity: 0; transform: scale(0.9) translateY(-8px); filter: blur(4px); }
  to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
}

.word-defs {
  margin-top: 10px;
  display: flex;
  justify-content: center;
  gap: 6px;
  flex-wrap: wrap;
}

.def-tag {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.75rem;
  color: var(--neon-orange);
  background: rgba(255,107,0,0.12);
  border: 1px solid rgba(255,107,0,0.4);
  border-radius: 2px;
  padding: 3px 8px;
  text-shadow: 0 0 6px rgba(255,107,0,0.5);
  animation: wordAppear 0.5s ease-out 0.1s both;
}

.def-separator {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.75rem;
  color: rgba(200,232,255,0.4);
  align-self: center;
}

/* ===== ROOTS SECTION ===== */
.roots-label-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
  padding: 0 2px;
}

.root-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--neon-cyan);
  opacity: 0.55;
}

.roots-row {
  display: flex;
  gap: 10px;
  margin-bottom: 0;
}

.root-card {
  flex: 1;
  background: rgba(0, 245, 255, 0.06);
  border: 1px solid rgba(0,245,255,0.2);
  border-radius: 3px;
  padding: 12px 10px;
  text-align: center;
  position: relative;
  overflow: hidden;
  transition: border-color 0.3s;
}

.root-card::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
  opacity: 0.3;
}

.root-word {
  font-family: 'Orbitron', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  color: var(--neon-green);
  text-shadow: var(--glow-green);
  display: block;
  margin-bottom: 5px;
  letter-spacing: 1px;
}

.root-def {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.68rem;
  color: rgba(200,232,255,0.7);
  line-height: 1.4;
  font-style: italic;
}

/* Combo definition */
.combo-section {
  margin-top: 14px;
  padding: 12px;
  background: rgba(57,255,20,0.05);
  border: 1px solid rgba(57,255,20,0.2);
  border-radius: 3px;
  position: relative;
}

.combo-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.58rem;
  letter-spacing: 2px;
  color: var(--neon-green);
  opacity: 0.6;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.combo-text {
  font-family: 'Exo 2', sans-serif;
  font-size: 0.88rem;
  color: var(--neon-green);
  text-shadow: 0 0 6px rgba(57,255,20,0.4);
  font-weight: 600;
  line-height: 1.5;
  animation: wordAppear 0.5s ease-out 0.15s both;
}

.combo-text-alt {
  font-family: 'Exo 2', sans-serif;
  font-size: 0.78rem;
  color: rgba(57,255,20,0.5);
  font-style: italic;
  margin-top: 3px;
  animation: wordAppear 0.5s ease-out 0.2s both;
}

/* ===== BUTTON ===== */
.btn-wrap {
  padding: 20px 0 10px;
  display: flex;
  justify-content: center;
}

.btn-nouveau {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #03050a;
  background: var(--neon-cyan);
  border: none;
  border-radius: 3px;
  padding: 14px 36px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: all 0.2s;
  box-shadow: 0 0 12px rgba(0,245,255,0.5), 0 0 30px rgba(0,245,255,0.2);
  -webkit-tap-highlight-color: transparent;
  min-width: 200px;
}

.btn-nouveau::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
  transition: left 0.4s;
}

.btn-nouveau:active::before {
  left: 100%;
}

.btn-nouveau:active {
  transform: scale(0.96);
  box-shadow: 0 0 6px rgba(0,245,255,0.8), 0 0 20px rgba(0,245,255,0.4);
}

.btn-nouveau::after {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: 3px;
  border: 1px solid rgba(255,255,255,0.3);
  pointer-events: none;
}

/* ===== FOOTER ===== */
footer {
  text-align: center;
  padding: 16px 0 8px;
  position: relative;
  z-index: 2;
}

footer span {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.6rem;
  color: rgba(200,232,255,0.3);
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* Glitch effect on title hover */
header h1:hover {
  animation: glitch 0.3s steps(2) forwards, titlePulse 3s ease-in-out infinite 0.3s;
}

@keyframes glitch {
  0% { text-shadow: 0 0 8px #00f5ff, 3px 0 0 rgba(255,45,120,0.7), -3px 0 0 rgba(57,255,20,0.7); }
  25% { text-shadow: 0 0 8px #00f5ff, -3px 0 0 rgba(255,45,120,0.7), 3px 0 0 rgba(57,255,20,0.7); }
  50% { text-shadow: 0 0 8px #00f5ff, 2px 2px 0 rgba(255,45,120,0.7), -2px -2px 0 rgba(57,255,20,0.7); }
  100% { text-shadow: 0 0 14px #00f5ff, 0 0 40px rgba(0,245,255,0.6); }
}

/* Floating particles */
.particle {
  position: fixed;
  pointer-events: none;
  z-index: 1;
  border-radius: 50%;
  animation: floatUp linear infinite;
  opacity: 0;
}

@keyframes floatUp {
  0% { transform: translateY(100vh) scale(0); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 0.6; }
  100% { transform: translateY(-10vh) scale(1); opacity: 0; }
}

/* HUD corner element */
.hud-corner {
  position: fixed;
  bottom: 16px;
  right: 16px;
  z-index: 3;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 3px;
  opacity: 0.4;
}

.hud-line {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.5rem;
  color: var(--neon-cyan);
  letter-spacing: 1px;
}

/* Effet de lueur au survol */
.root-card:hover {
  border-color: rgba(0,245,255,0.5);
  background: rgba(0,245,255,0.1);
  transition: all 0.2s;
}
</style>

</head>

function getPrefixe(n) {
  return prefixes[(n - 1) % prefixes.length];
}

function getSuffixe(n) {
  return suffixes[(n - 1) % suffixes.length];
}

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function genererAuto() {
  const pi = randInt(1, prefixes.length);
  const si = randInt(1, suffixes.length);
  const p = getPrefixe(pi);
  const s = getSuffixe(si);

  // Animation refresh
  const motEl = document.getElementById('mot-display');
  motEl.style.animation = 'none';
  motEl.offsetHeight;
  motEl.style.animation = '';

  document.getElementById('mot-display').textContent = p.mot + s.mot;
  document.getElementById('def-prefix').textContent = p.def;
  document.getElementById('def-suffix').textContent = s.def;
  document.getElementById('prefix-word').textContent = p.mot;
  document.getElementById('prefix-def').textContent = p.def;
  document.getElementById('suffix-word').textContent = s.mot;
  document.getElementById('suffix-def').textContent = s.def;
  document.getElementById('combo-1').textContent = p.def + ' ' + s.def;
  document.getElementById('combo-2').textContent = 'ou : ' + s.def + ' ' + p.def;
  
  // Mise à jour du compteur HUD
  document.getElementById('hud-count').textContent = `LOAD: ${prefixes.length}×${suffixes.length}`;
}

// Particules flottantes
function createParticle() {
  const p = document.createElement('div');
  p.className = 'particle';
  const colors = ['#00f5ff','#ff2d78','#39ff14','#ff6b00'];
  const color = colors[Math.floor(Math.random() * colors.length)];
  const size = Math.random() * 3 + 1;
  p.style.cssText = `
    left: ${Math.random()*100}%;
    width: ${size}px;
    height: ${size}px;
    background: ${color};
    box-shadow: 0 0 ${size*2}px ${color};
    animation-duration: ${Math.random()*8+6}s;
    animation-delay: ${Math.random()*5}s;
  `;
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 14000);
}

setInterval(createParticle, 1800);

// Initialisation
genererAuto();
